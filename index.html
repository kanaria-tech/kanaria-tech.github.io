<style>
  /* ===========================================================
     THEME — change --accent to rebrand the whole page in one go
     =========================================================== */
  :root {
    --bg:        #E9EAEC;
    --card:      #15181E;
    --row:       #1E222B;
    --row-hover: #272D38;
    --line:      rgba(255,255,255,0.07);
    --text:      #F3F5F8;
    --muted:     #99A2B0;
    --accent:    #E8552D;            /* Kanaria orange — change to rebrand */
    --on-accent: #FFFFFF;
    --radius:    18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100dvh;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(120% 80% at 50% -10%, color-mix(in srgb, var(--accent) 24%, transparent), transparent 60%);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: clamp(20px, 6vw, 56px) 18px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 430px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 26px;
    padding: 30px 22px 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 30px 60px -20px rgba(10,12,16,0.45),
      0 8px 20px -12px rgba(10,12,16,0.3);
    animation: cardIn 0.7s cubic-bezier(.16,1,.3,1) both;
  }

  /* ---------- header: Kanaria [logo] Tech lockup ---------- */
  .head { margin-bottom: 26px; }

  .brand {
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
  }
  .brand-name {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700; font-size: 28px; letter-spacing: -0.5px;
    color: var(--text); line-height: 1;
  }
  .brand-logo {
    width: 60px; height: 60px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  /* The logo floats directly on the card. If your PNG has a solid/white
     background instead of transparency and you'd prefer a rounded badge,
     add to .brand-logo:  background:#fff; border-radius:16px; padding:8px; */
  .brand-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }

  /* ---------- link rows ---------- */
  .links { display: flex; flex-direction: column; gap: 9px; }

  .row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--row);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text); text-decoration: none;
    transition: background .14s ease, transform .12s ease;
    animation: rowIn 0.5s cubic-bezier(.16,1,.3,1) both;
  }
  .row:hover { background: var(--row-hover); transform: translateY(-1px); }
  .row:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .row .ico {
    width: 22px; height: 22px; flex-shrink: 0;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
  }
  .row:hover .ico { color: var(--text); }
  .row .ico svg { width: 22px; height: 22px; }

  .row .label { flex: 1; font-size: 15px; font-weight: 500; line-height: 1.25; }
  .row .label .sub { display: block; font-size: 12.5px; font-weight: 400; color: var(--muted); margin-top: 1px; }
  .row .chev { color: var(--muted); opacity: .55; }
  .row .chev svg { width: 16px; height: 16px; display: block; }

  /* stagger reveal */
  .links .row:nth-child(1) { animation-delay: .16s; }
  .links .row:nth-child(2) { animation-delay: .22s; }
  .links .row:nth-child(3) { animation-delay: .28s; }
  .links .row:nth-child(4) { animation-delay: .34s; }
  .links .row:nth-child(5) { animation-delay: .40s; }
  .links .row:nth-child(6) { animation-delay: .46s; }

  /* ---------- partners divider ---------- */
  .section-label {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 2px 12px;
  }
  .section-label::before, .section-label::after {
    content: ""; height: 1px; flex: 1; background: var(--line);
  }
  .section-label span {
    font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
  }

  .foot {
    text-align: center; color: var(--muted);
    font-size: 12px; margin-top: 22px; letter-spacing: .2px;
  }

  /* ---------- motion ---------- */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(.98); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card, .row { animation: none; }
  }
</style>
